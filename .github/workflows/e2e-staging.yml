name: E2E Staging Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  issue_comment:
    types: [created]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Run E2E Tests on Vercel Preview
    timeout-minutes: 60
    runs-on: ubuntu-latest
    # For issue_comment: only run when a maintainer comments /run-e2e <url> on a PR
    if: |
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/run-e2e') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'COLLABORATOR')
      )
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # For PR comments, checkout the PR's branch (works with forks too)
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright Browsers
        run: pnpm exec playwright install --with-deps

      - name: Wait for Vercel deployment
        if: github.event_name != 'issue_comment'
        run: sleep 60

      - name: Get Vercel Preview URL
        id: get-vercel-preview-url
        if: github.event_name != 'issue_comment'
        uses: zentered/vercel-preview-url@v1.4.0
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_ACCESS_TOKEN }}
        with:
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel_team_id: ${{ secrets.VERCEL_TEAM_ID }}

      - name: Resolve Vercel Preview URL
        id: resolve-url
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ]; then
            # Extract URL from comment: /run-e2e https://my-project-abc123.vercel.app
            URL=$(echo "${{ github.event.comment.body }}" | grep -oP 'https?://\S+' | head -1)
            echo "url=$URL" >> $GITHUB_OUTPUT
          else
            echo "url=https://${{ steps.get-vercel-preview-url.outputs.preview_url }}" >> $GITHUB_OUTPUT
          fi

      - name: Display Vercel Preview URL
        run: |
          echo "Vercel Preview URL: ${{ steps.resolve-url.outputs.url }}"

      - name: Run Playwright tests against Vercel Preview
        run: pnpm exec playwright test staging
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.resolve-url.outputs.url }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
